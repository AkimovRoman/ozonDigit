<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}OzonDigit{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">OzonDigit</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="topNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'rnp' %}active{% endif %}" href="/rnp">РНП</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'forecast' %}active{% endif %}" href="/forecast">Прогноз</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'settings' %}active{% endif %}" href="/settings">Настройки</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link {% if active_page == 'products' %}active{% endif %}" href="/products">Товары</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link {% if active_page == 'campaigns' %}active{% endif %}" href="/campaigns">Кампании</a>
                </li>
            </ul>

            {% if ozon_accounts and ozon_accounts|length > 0 %}
            <form method="post" action="/switch-ozon-account" class="me-3">
                <select class="form-select form-select-sm"
                        name="ozon_account_id"
                        onchange="this.form.submit()">
                    {% for acc in ozon_accounts %}
                        <option value="{{ acc.id }}"
                            {% if active_ozon_account and acc.id == active_ozon_account.id %}selected{% endif %}>
                            {{ acc.name or acc.client_id }}
                        </option>
                    {% endfor %}
                </select>
            </form>
            {% else %}
                <span class="text-light me-3 small">Кабинет не выбран</span>
            {% endif %}

            <a href="/logout" class="btn btn-outline-light btn-sm">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
